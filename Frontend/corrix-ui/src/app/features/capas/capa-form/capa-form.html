<section class="cx-page">
  <div class="cx-page-header">
    <h1 class="cx-page-title">CAPA Form</h1>
    <p class="cx-page-subtitle">Create and edit CAPAs.</p>
  </div>

  <div class="cx-card">
    <form [formGroup]="capaForm" (ngSubmit)="onSubmit()">

      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="capaNumber">CAPA Number</label>
        <input class="cx-input cx-input-full" id="capaNumber"
               type="text" formControlName="capaNumber" />
      </div>
      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="title">Title</label>
        <input class="cx-input cx-input-full" id="title"
               type="text" formControlName="title" />
      </div>
      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="description">Description</label>
        <textarea class="cx-input cx-input-full" id="description"
                  formControlName="description" rows="4"
                  style="height: auto; padding: 8px 12px;"></textarea>
      </div>
      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="statusId">Status</label>
        <select class="cx-select" id="statusId" formControlName="statusId">
          <option value="">Select status</option>
          <option *ngFor="let status of statuses" [value]="status.id">{{ status.name }}</option>
        </select>
      </div>
      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="severityId">Severity</label>
        <select class="cx-select" id="severityId" formControlName="severityId">
          <option value="">Select severity</option>
          <option *ngFor="let severity of severities" [value]="severity.id">{{ severity.name }}</option>
        </select>
      </div>
      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="sourceTypeId">Source Type</label>
        <select class="cx-select" id="sourceTypeId" formControlName="sourceTypeId">
          <option value="">Select source type</option>
          <option *ngFor="let sourceType of sourceTypes" [value]="sourceType.id">{{ sourceType.name }}</option>
        </select>
      </div>
      <div class="cx-form-field" style="margin-bottom: 14px;">
        <label for="ownerId">Owner</label>
        <select class="cx-select" id="ownerId" formControlName="ownerId">
          <option value="">Select owner</option>
          <option *ngFor="let user of users" [value]="user.id">{{ user.username }}</option>
        </select>
      </div>
      <div class="cx-form-field" style="margin-bottom: 20px;">
        <label for="dueDate">Due Date</label>
        <input class="cx-input" id="dueDate" type="date" formControlName="dueDate" />
      </div>

      <p *ngIf="errorMessage" style="color: var(--cx-overdue); font-size: 13px; margin-bottom: 12px;">
        {{ errorMessage }}
      </p>

      <div class="cx-detail-actions">
        <button class="cx-btn cx-btn-primary" type="submit" [disabled]="capaForm.invalid">Submit</button>
        <a class="cx-btn" routerLink="/capas">Cancel</a>
      </div>
    </form>
  </div>
</section>
